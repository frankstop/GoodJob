name: Refresh job data

on:
  schedule:
    - cron: "12 5,11,17,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: goodjob-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install package
        run: npm install

      - name: Fetch employer ATS feeds
        run: npm run fetch:jobs

      - name: Validate generated data and dashboard behavior
        run: npm test

      - name: Commit refreshed public data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/jobs.json public/data/sources.json public/data/meta.json
          if git diff --cached --quiet; then
            echo "No public job data changes."
          else
            git commit -m "Refresh employer job data"
            git push
          fi
